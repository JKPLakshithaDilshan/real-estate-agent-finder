spring.application.name=real-estate-agent-finder
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Spring DevTools - Prevent restart on static/template changes
spring.devtools.restart.exclude=static/**,templates/**
spring.devtools.restart.poll-interval=2000
spring.devtools.restart.quiet-period=1000

# Static Resources
# Include source static folder so newly uploaded files are visible immediately during local development.
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/

# Data file paths (used by FileHandler)
app.data.admins=src/main/resources/data/admins.txt
app.data.agents=src/main/resources/data/agents.txt
app.data.users=src/main/resources/data/users.txt
app.data.appointments=src/main/resources/data/appointments.txt
app.data.ratings=src/main/resources/data/ratings.txt
app.data.reviews=src/main/resources/data/reviews.txt

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=10MB

# Default admin seed (first run)
app.seed.admin.enabled=true
app.seed.admin.email=admin@realestate.com
app.seed.admin.password=Admin@123
app.seed.admin.name=System Admin
