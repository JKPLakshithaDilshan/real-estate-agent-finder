<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/management-premium.css}" />
</head>

<body>
    <div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

    <main class="container management-main content-shell">
        <div th:if="${toastSuccess}" class="d-none" data-toast-message="" data-toast-type="success" th:attr="data-toast-message=${toastSuccess}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <section class="management-toolbar surface-card mb-4">
            <div class="panel-header">
                <div>
                    <h3 class="mb-1">Customer Directory</h3>
                </div>
                <div class="inline-summary">
                    <span class="summary-chip"><i class="fa-solid fa-address-book"></i><span th:text="${#lists.size(users)}"></span> Users</span>
                </div>
            </div>

            <form th:action="@{/admin/users}" method="get" class="toolbar-grid">
                <div class="toolbar-col-6">
                    <label class="form-label" for="q">Search by ID, username, or email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input id="q" type="search" name="q" class="form-control" th:value="${query}" placeholder="U001 or john_doe" />
                    </div>
                </div>
                <div class="toolbar-col-6">
                    <div class="toolbar-actions">
                        <button type="submit" class="btn btn-site-gold"><i class="fa-solid fa-magnifying-glass me-1"></i>Search</button>
                        <a th:href="@{/admin/users}" class="btn btn-premium-outline">Reset</a>
                    </div>
                </div>
            </form>
        </section>

        <section class="management-panel surface-card premium-table-shell" th:if="${!#lists.isEmpty(users)}">
            <div class="table-responsive">
                <table class="table align-middle mb-0" style="min-width: 860px;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="fw-semibold" th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span class="status-pill" th:classappend="${user.active} ? ' active' : ' inactive'" th:text="${user.active ? 'ACTIVE' : 'INACTIVE'}"></span>
                            </td>
                            <td>
                                <div class="d-flex gap-2 flex-wrap dense-actions">
                                    <a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-premium-outline btn-sm">Profile</a>
                                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                                          onsubmit="return confirm('Delete this user account permanently? This action cannot be undone.');">
                                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="management-panel surface-card management-empty" th:if="${#lists.isEmpty(users)}">
            <div class="icon"><i class="fa-solid fa-users-slash"></i></div>
            <h4>No users found</h4>
            <p>No user records match the current search. Adjust your query or add a new user.</p>
        </section>
    </main>

    <div th:replace="~{fragments/site-layout :: siteFooter}"></div>
    <div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
