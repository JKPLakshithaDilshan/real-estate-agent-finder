<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <section th:fragment="pageHeader(title, subtitle, iconClass, backUrl, backLabel, showBreadcrumb)"
             class="page-header-premium py-4 mb-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                <div class="d-flex align-items-start gap-3">
                    <div class="page-header-icon">
                        <i th:class="${iconClass != null and !#strings.isEmpty(iconClass)} ? ${iconClass} : 'fa-solid fa-building'"></i>
                    </div>
                    <div>
                        <h1 class="page-header-title mb-1" th:text="${title}">Page Title</h1>
                        <p class="page-header-subtitle mb-2" th:text="${subtitle}">Page subtitle</p>

                        <nav th:if="${showBreadcrumb}" aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0 small">
                                <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                                <li class="breadcrumb-item active" aria-current="page" th:text="${title}">Current</li>
                            </ol>
                        </nav>
                    </div>
                </div>

                <a th:if="${backUrl != null and !#strings.isEmpty(backUrl)}"
                   th:href="${backUrl}"
                   class="btn btn-site-outline page-header-back">
                    <i class="fa-solid fa-arrow-left me-2"></i>
                    <span th:text="${(backLabel != null and !#strings.isEmpty(backLabel)) ? backLabel : 'Back'}">Back</span>
                </a>
            </div>
        </div>
    </section>
</body>

</html>
