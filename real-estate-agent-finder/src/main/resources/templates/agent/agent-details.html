<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/agent-premium-pages.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container agent-detail-main content-shell">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="row g-4 align-items-stretch">
        <div class="col-lg-5">
            <article class="profile-card h-100">
                <div class="profile-cover"></div>
                <div class="profile-body">
                    <img class="detail-avatar"
                        th:src="${#strings.isEmpty(agent.profileImage)} ? 'https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=900&q=80' : @{/images/agents/{filename}(filename=${agent.profileImage})}"
                        onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=900&q=80';"
                         alt="Agent photo" />

                    <h2 class="h4 mb-1" th:text="${agent.name}">Agent Name</h2>
                    <p class="agent-meta mb-2"><i class="fa-solid fa-at me-1"></i><span th:text="${agent.username}"></span></p>
                    <p class="agent-meta mb-3"><i class="fa-solid fa-location-dot me-1"></i><span th:text="${agent.location}"></span></p>

                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <span class="soft-tag" th:text="${agent.id}"></span>
                        <span class="rating-pill"><i class="fa-solid fa-star me-1"></i><span th:text="${agent.averageRating}"></span></span>
                        <span class="status-pill"
                              th:classappend="${agent.approvalStatus == 'APPROVED'} ? ' active' : (${agent.approvalStatus == 'PENDING'} ? ' warning' : ' inactive')"
                              th:text="${agent.approvalStatus}"></span>
                    </div>

                    <div class="profile-info-list">
                        <p><i class="fa-solid fa-envelope"></i><span th:text="${agent.email}"></span></p>
                        <p><i class="fa-solid fa-phone"></i><span th:text="${agent.phone}"></span></p>
                        <p><i class="fa-solid fa-address-card"></i><span th:text="${agent.nicNumber}"></span></p>
                        <p><i class="fa-solid fa-location-crosshairs"></i><span th:text="${agent.address}"></span></p>
                        <p><i class="fa-solid fa-briefcase"></i><span th:text="${agent.specialization}"></span></p>
                        <p><i class="fa-solid fa-award"></i><span th:text="${agent.yearsOfExperience + ' years experience'}"></span></p>
                    </div>

                    <div class="d-grid gap-2 mt-3" th:if="${!adminView}">
                        <a class="btn btn-site-gold" th:href="@{/appointments/new(agentId=${agent.id})}">
                            <i class="fa-solid fa-calendar-check me-1"></i>Book Appointment
                        </a>
                        <a class="btn btn-premium-outline" th:href="@{/ratings/new(agentId=${agent.id})}">
                            <i class="fa-solid fa-star me-1"></i>Rate Agent
                        </a>
                        <a class="btn btn-premium-outline" th:href="@{/reviews/new(agentId=${agent.id})}">
                            <i class="fa-solid fa-pen-to-square me-1"></i>Write a Review
                        </a>
                    </div>

                    <div class="d-flex gap-2 flex-wrap mt-3" th:if="${adminView}">
                        <a class="btn btn-soft-neutral" th:href="@{/admin/agents/{id}/edit(id=${agent.id})}">Edit</a>
                        <form th:if="${agent.approvalStatus == 'PENDING'}" th:action="@{/admin/agents/approve/{id}(id=${agent.id})}" method="post">
                            <button type="submit" class="btn btn-site-gold">Approve</button>
                        </form>
                        <form th:if="${agent.approvalStatus == 'PENDING'}" th:action="@{/admin/agents/reject/{id}(id=${agent.id})}" method="post">
                            <button type="submit" class="btn btn-danger">Reject</button>
                        </form>
                    </div>
                </div>
            </article>
        </div>

        <div class="col-lg-7">
            <article class="review-preview-card h-100">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="h5 mb-0"><i class="fa-solid fa-comments me-2"></i>Recent Reviews</h3>
                    <a class="btn btn-sm btn-premium-outline" th:href="@{/reviews(agentId=${agent.id})}" th:if="${!adminView}">View All</a>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-sm-4">
                        <div class="metric-mini">
                            <h6>Average Rating</h6>
                            <p th:text="${agent.averageRating}"></p>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="metric-mini">
                            <h6>Total Ratings</h6>
                            <p th:text="${agent.totalRatings}"></p>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="metric-mini">
                            <h6>Applied At</h6>
                            <p th:text="${#strings.isEmpty(agent.createdAt) ? '-' : agent.createdAt}"></p>
                        </div>
                    </div>
                </div>

                <div class="insight-note mb-3">
                    <i class="fa-solid fa-lightbulb me-2"></i><span th:text="${#strings.isEmpty(agent.bio) ? 'No bio provided.' : agent.bio}"></span>
                </div>

                <div th:if="${!#lists.isEmpty(reviews)}" class="review-stack">
                    <div class="review-item" th:each="review, reviewStat : ${reviews}" th:if="${reviewStat.index < 4}">
                        <div class="review-head">
                            <strong th:text="${reviewerNames[review.userId] != null ? reviewerNames[review.userId] : review.userId}">User</strong>
                            <span th:text="${review.createdAt}">Date</span>
                        </div>
                        <p th:text="${review.comment}"></p>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(reviews)}" class="text-center py-5">
                    <i class="fa-regular fa-message fs-2 text-secondary mb-3"></i>
                    <h5 class="mb-1">No reviews yet</h5>
                    <p class="text-secondary mb-0">No client reviews available for this agent yet.</p>
                </div>
            </article>
        </div>
    </section>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
