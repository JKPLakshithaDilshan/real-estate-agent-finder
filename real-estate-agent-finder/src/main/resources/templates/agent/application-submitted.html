<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Submitted</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container py-5 content-shell" style="max-width: 900px;">
    <div class="site-card p-4 p-md-5 text-center">
        <div class="display-6 text-success mb-3"><i class="fa-solid fa-circle-check"></i></div>
        <h1 class="h3 mb-2">Agent Application Submitted</h1>
        <p class="text-secondary mb-4">Your profile has been submitted and is awaiting admin approval.</p>

        <div class="row g-3 text-start mb-4">
            <div class="col-md-6"><strong>Application ID:</strong> <span th:text="${agent.id}"></span></div>
            <div class="col-md-6"><strong>Status:</strong> <span class="status-pill warning" th:text="${agent.approvalStatus}"></span></div>
            <div class="col-md-6"><strong>Name:</strong> <span th:text="${agent.name}"></span></div>
            <div class="col-md-6"><strong>Email:</strong> <span th:text="${agent.email}"></span></div>
        </div>

        <p class="text-secondary">Approval is required before your agent profile appears publicly or can be used in normal agent features.</p>

        <div class="d-flex justify-content-center gap-2 flex-wrap mt-3">
            <a th:href="@{/}" class="btn btn-premium-outline">Back to Home</a>
            <a th:href="@{/agents}" class="btn btn-site-gold">Browse Approved Agents</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
