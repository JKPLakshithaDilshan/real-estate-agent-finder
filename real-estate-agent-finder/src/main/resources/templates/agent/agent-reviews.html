<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/management-premium.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container feedback-main content-shell">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="review-stack-premium surface-panel" th:if="${!#lists.isEmpty(reviews)}">
        <article th:each="review : ${reviews}" class="review-card-premium surface-card-hover">
            <div class="review-meta mb-2">
                <span><i class="fa-solid fa-user me-1"></i><span th:text="${review.userId}"></span></span>
                <span><i class="fa-regular fa-clock me-1"></i><span th:text="${review.createdAt}"></span></span>
            </div>
            <p th:text="${review.comment}"></p>
        </article>
    </section>

    <section class="management-panel surface-card management-empty" th:if="${#lists.isEmpty(reviews)}">
        <div class="icon"><i class="fa-regular fa-message"></i></div>
        <h4>No reviews received yet</h4>
        <p>Customer reviews will appear here after completed appointments.</p>
    </section>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
