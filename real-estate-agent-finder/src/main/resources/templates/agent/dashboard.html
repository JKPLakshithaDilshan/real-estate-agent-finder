<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/management-premium.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container profile-main content-shell" style="max-width: 1180px;">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="profile-shell surface-panel">
        <article class="profile-summary-card">
            <div class="hero-band">
                <div class="eyebrow">Agent Workspace</div>
                <h1 th:text="${agent.name}"></h1>
                <p th:text="${agent.specialization + ' • ' + agent.location}"></p>
            </div>

            <div class="detail-grid mb-3">
                <div class="detail-item">
                    <div class="label">Agent ID</div>
                    <div class="value" th:text="${agent.id}"></div>
                </div>
                <div class="detail-item">
                    <div class="label">Average Rating</div>
                    <div class="value" th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></div>
                </div>
                <div class="detail-item">
                    <div class="label">Total Ratings</div>
                    <div class="value" th:text="${#lists.size(ratings)}"></div>
                </div>
                <div class="detail-item">
                    <div class="label">Reviews</div>
                    <div class="value" th:text="${#lists.size(reviews)}"></div>
                </div>
            </div>

            <div class="action-cluster">
                <a th:href="@{/appointments/agent}" class="btn btn-site-gold">My Appointments</a>
                <a th:href="@{/agent/reviews}" class="btn btn-premium-outline">Reviews About Me</a>
                <a th:href="@{/agent/ratings}" class="btn btn-premium-outline">Ratings About Me</a>
                <a th:href="@{/agents/{id}(id=${agent.id})}" class="btn btn-premium-outline">Public Agent Page</a>
            </div>
        </article>

        <article class="timeline-card">
            <div class="timeline-header">
                <div>
                    <h3 class="mb-1">Recent Appointments</h3>
                </div>
                <a th:href="@{/appointments/agent}" class="btn btn-soft-neutral btn-sm">Open Full List</a>
            </div>

            <div class="timeline-list" th:if="${!#lists.isEmpty(appointments)}">
                <div class="timeline-item" th:each="apt, st : ${appointments}" th:if="${st.index < 6}">
                    <div class="meta">
                        <strong th:text="${apt.appointmentDateTime}"></strong>
                        <span class="status-pill"
                              th:classappend="${#strings.equalsIgnoreCase(apt.status, 'CONFIRMED')} ? ' active' : (${#strings.equalsIgnoreCase(apt.status, 'COMPLETED')} ? ' active' : (${#strings.equalsIgnoreCase(apt.status, 'CANCELLED')} ? ' inactive' : ' warning'))"
                              th:text="${apt.status}"></span>
                    </div>
                    <div class="inline-summary">
                        <span class="summary-chip"><i class="fa-solid fa-user me-1"></i><span th:text="${apt.userId}"></span></span>
                        <span class="summary-chip"><i class="fa-solid fa-hashtag me-1"></i><span th:text="${apt.id}"></span></span>
                    </div>
                </div>
            </div>

            <div class="management-empty" th:if="${#lists.isEmpty(appointments)}">
                <div class="icon"><i class="fa-regular fa-calendar-xmark"></i></div>
                <h4>No appointments yet</h4>
                <p>New customer bookings will appear here.</p>
            </div>
        </article>
    </section>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
