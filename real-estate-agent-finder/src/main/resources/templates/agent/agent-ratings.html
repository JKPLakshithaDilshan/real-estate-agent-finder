<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Ratings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/management-premium.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container ratings-main content-shell">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="rating-summary-card surface-card mb-4">
        <div class="panel-header">
            <div>
                <h3 class="mb-1">Ratings Received</h3>
                <p>Your average and incoming user scores are shown below.</p>
            </div>
            <div class="inline-summary">
                <span class="summary-chip"><i class="fa-solid fa-star-half-stroke"></i>Average <span th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></span></span>
                <span class="summary-chip"><i class="fa-solid fa-user-tie"></i><span th:text="${agentId}"></span></span>
            </div>
        </div>
    </section>

    <section class="management-panel surface-card premium-table-shell" th:if="${!#lists.isEmpty(ratings)}">
        <div class="table-responsive">
            <table class="table align-middle mb-0" style="min-width: 760px;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User ID</th>
                        <th>Score</th>
                        <th>Rated At</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="rating : ${ratings}">
                        <td class="fw-semibold" th:text="${rating.id}"></td>
                        <td th:text="${rating.userId}"></td>
                        <td><span class="rating-score-display"><i class="fa-solid fa-star"></i><span th:text="${rating.score}"></span></span></td>
                        <td th:text="${rating.ratedAt}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="management-panel surface-card management-empty" th:if="${#lists.isEmpty(ratings)}">
        <div class="icon"><i class="fa-regular fa-star"></i></div>
        <h4>No ratings received yet</h4>
        <p>Ratings posted by users after completed appointments will appear here.</p>
    </section>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
