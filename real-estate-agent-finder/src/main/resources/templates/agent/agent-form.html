<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${adminView} ? (${formMode == 'edit'} ? 'Edit Agent' : 'Create Agent') : 'Agent Application'">Agent Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/agent-premium-pages.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container page-shell content-shell">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="site-card mx-auto" style="max-width: 1040px; padding: 1.4rem;">
        <form class="row g-3"
              th:action="${adminView} ? (${formMode == 'edit'} ? @{/admin/agents/{id}/update(id=${agent.id})} : @{/admin/agents/save}) : @{/agents/apply}"
              th:object="${agent}" method="post" enctype="multipart/form-data" novalidate>

            <div class="col-md-6">
                <label class="form-label" for="name">Full Name</label>
                <input id="name" class="form-control" type="text" th:field="*{name}" required minlength="3" maxlength="60" />
            </div>

            <div class="col-md-6">
                <label class="form-label" for="username">Username</label>
                <input id="username" class="form-control" type="text" th:field="*{username}" required minlength="3" maxlength="50" />
            </div>

            <div class="col-md-6">
                <label class="form-label" for="email">Email</label>
                <input id="email" class="form-control" type="email" th:field="*{email}" required data-trim="true" />
                <div class="field-error" data-error-for="email">Enter a valid email address.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="phone">Phone</label>
                <input id="phone" class="form-control" type="tel" th:field="*{phone}" required data-trim="true" data-phone-ten-digits="true" inputmode="numeric" maxlength="10" />
                <div class="field-error" data-error-for="phone">Phone number must contain exactly 10 digits.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="address">Address</label>
                <input id="address" class="form-control" type="text" th:field="*{address}" required minlength="3" maxlength="120" />
            </div>

            <div class="col-md-6">
                <label class="form-label" for="nicNumber">NIC/ID Number</label>
                <input id="nicNumber" class="form-control" type="text" th:field="*{nicNumber}" required data-trim="true" data-nic-id="true" minlength="10" maxlength="12" />
                <div class="field-error" data-error-for="nicNumber">NIC/ID must be 12 digits or 9 digits followed by V.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="password">Password</label>
                <input id="password" class="form-control" type="password" name="password"
                       th:value="${agent.password}"
                       th:attr="required=${!adminView or formMode != 'edit'}"
                       autocomplete="current-password"
                       placeholder="At least 8 chars with upper/lower/number/symbol" />
                <small class="text-secondary" th:if="${adminView and formMode == 'edit'}">Leave blank to keep current password.</small>
            </div>

            <div class="col-md-6">
                <label class="form-label" for="specialization">Specialization</label>
                <input id="specialization" class="form-control" type="text" th:field="*{specialization}" required minlength="2" maxlength="80" />
            </div>

            <div class="col-md-6">
                <label class="form-label" for="location">Category / Location</label>
                <input id="location" class="form-control" type="text" th:field="*{location}" required minlength="2" maxlength="80" />
            </div>

            <div class="col-md-6">
                <label class="form-label" for="yearsOfExperience">Years of Experience</label>
                <input id="yearsOfExperience" class="form-control" type="number" min="0" max="60" th:field="*{yearsOfExperience}" required />
            </div>

            <div class="col-md-6">
                <label class="form-label" for="imageFile">Profile Photo</label>
                <div th:if="${formMode == 'edit' and !#strings.isEmpty(agent.profileImage)}" class="mb-2 d-flex align-items-center gap-2">
                    <img th:src="@{/images/agents/{f}(f=${agent.profileImage})}"
                         alt="Current profile photo"
                         class="rounded" style="height:72px;width:72px;object-fit:cover;border:2px solid var(--gold);" />
                    <span class="text-secondary small" th:text="${agent.profileImage}"></span>
                </div>
                <input id="imageFile" class="form-control" type="file" name="imageFile"
                       accept=".jpg,.jpeg,.png,.gif,image/*" />
                <small class="text-secondary" th:if="${formMode == 'edit'}">Leave blank to keep the current photo.</small>
            </div>

            <div class="col-12">
                <label class="form-label" for="bio">Profile Description / Bio</label>
                <textarea id="bio" class="form-control" th:field="*{bio}" rows="4" maxlength="500"></textarea>
            </div>

            <div class="col-12 d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-site-gold"
                        th:text="${adminView} ? (${formMode == 'edit'} ? 'Update Agent' : 'Create Agent') : 'Submit Application'"></button>
                <a th:href="${adminView} ? @{/admin/agents} : @{/agents}" class="btn btn-premium-outline">Cancel</a>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/validation.js}"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
