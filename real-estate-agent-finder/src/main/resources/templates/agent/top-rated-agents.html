<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Rated Agents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/agent-premium-pages.css}" />
</head>

<body>
    <div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

    <br>

    <main class="container pb-4 content-shell">
        <section class="directory-summary surface-card mb-4">
            <div class="row g-4 align-items-center">
                <div class="col-lg-8">
                    <h4 class="mb-2">Leaderboard driven by client trust</h4>
                </div>
                <div class="col-lg-4 text-lg-end">
                    <span class="summary-pill me-2"><i class="fa-solid fa-trophy me-1"></i>Performance Ranking</span>
                </div>
            </div>
        </section>

        <section class="sort-summary-card surface-card mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-lg-8">
                    <h5 class="mb-1"><i class="fa-solid fa-arrow-down-wide-short me-2"></i>Sorting Summary</h5>
                </div>
                <div class="col-lg-4 text-lg-end">
                    <span class="summary-pill me-2"><i class="fa-solid fa-users me-1"></i><span th:text="${#lists.size(agents)}"></span> Agents</span>
                    <span class="summary-pill"><i class="fa-solid fa-star me-1"></i>Top to Lowest</span>
                </div>
            </div>
        </section>

        <section class="row g-4" th:if="${!#lists.isEmpty(agents)}">
            <div class="col-md-6 col-xl-4" th:each="agent, stat : ${agents}">
                <article class="top-rated-card h-100">
                    <div class="top-rated-cover"></div>
                    <div class="p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="rank-badge" th:text="${'#' + (stat.index + 1)}"></span>
                            <span class="soft-tag" th:text="${agent.id}"></span>
                        </div>

                        <h5 class="mb-1" th:text="${agent.name}"></h5>
                        <p class="agent-meta mb-2"><i class="fa-solid fa-briefcase me-1"></i><span th:text="${agent.specialization}"></span></p>
                        <p class="agent-meta mb-3"><i class="fa-solid fa-location-dot me-1"></i><span th:text="${agent.location}"></span></p>

                        <div class="stars-row mb-2">
                            <i th:each="i : ${#numbers.sequence(1,5)}"
                               th:class="${agent.averageRating >= i} ? 'fa-solid fa-star' : 'fa-regular fa-star'"></i>
                            <span class="ms-2" th:text="${agent.averageRating + ' / 5'}"></span>
                        </div>

                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <span class="summary-pill"><i class="fa-solid fa-square-poll-vertical me-1"></i><span th:text="${agent.totalRatings}"></span> Ratings</span>
                            <span class="summary-pill"><i class="fa-solid fa-award me-1"></i><span th:text="${agent.yearsOfExperience}"></span> Years</span>
                        </div>

                        <div class="d-flex gap-2 flex-wrap">
                            <a class="btn btn-premium-outline btn-sm" th:href="@{/agents/{id}(id=${agent.id})}">
                                <i class="fa-solid fa-circle-info me-1"></i>View Profile
                            </a>
                            <a class="btn btn-site-gold btn-sm" th:href="@{/appointments/new(agentId=${agent.id})}">
                                <i class="fa-solid fa-calendar-plus me-1"></i>Book
                            </a>
                        </div>
                    </div>
                </article>
            </div>
        </section>

        <section class="empty-state surface-card" th:if="${#lists.isEmpty(agents)}">
            <div class="empty-icon"><i class="fa-solid fa-ranking-star"></i></div>
            <h5 class="mb-1">No rated agents yet</h5>
            <p class="mb-0">Ratings will appear here once clients start reviewing agents.</p>
        </section>
    </main>

    <div th:replace="~{fragments/site-layout :: siteFooter}"></div>
    <div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
