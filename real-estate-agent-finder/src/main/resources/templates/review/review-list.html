<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${#strings.isEmpty(pageTitle) ? 'Reviews' : pageTitle}">Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/management-premium.css}" />
</head>

<body>
    <div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

    <main class="container feedback-main content-shell">

        <div th:if="${toastSuccess}" class="d-none" data-toast-message="" data-toast-type="success" th:attr="data-toast-message=${toastSuccess}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <section class="management-toolbar surface-card mb-4">
            <div class="panel-header">
                <div>
                    <h3 class="mb-1">Review Directory</h3>
                </div>
                <div class="inline-summary">
                    <span class="summary-chip"><i class="fa-solid fa-comments"></i><span th:text="${#lists.size(reviews)}"></span> Reviews</span>
                </div>
            </div>

            <form th:action="@{/reviews}" method="get" class="toolbar-grid">
                <div class="toolbar-col-3">
                    <label class="form-label" for="agentId">Agent ID</label>
                    <input id="agentId" type="text" name="agentId" class="form-control" th:value="${agentId}" placeholder="A001" />
                </div>
                <div class="toolbar-col-3">
                    <label class="form-label" for="userId">User ID</label>
                    <input id="userId" type="text" name="userId" class="form-control" th:value="${userId}" placeholder="U001" />
                </div>
                <div class="toolbar-col-6">
                    <div class="toolbar-actions">
                        <button type="submit" class="btn btn-site-gold">Search</button>
                        <a th:href="@{/reviews}" class="btn btn-premium-outline">Reset</a>
                        <a th:if="${allowCreate}" th:href="@{/reviews/new(agentId=${agentId})}" class="btn btn-soft-neutral"><i class="fa-solid fa-pen-to-square me-1"></i>Add Review</a>
                    </div>
                </div>
            </form>
        </section>

        <section class="review-stack-premium surface-panel" th:if="${!#lists.isEmpty(reviews)}">
            <article th:each="review : ${reviews}" class="review-card-premium surface-card-hover">
                <div class="review-meta mb-2">
                    <span><i class="fa-solid fa-user-tie me-1"></i><span th:text="${review.agentId}"></span></span>
                    <span><i class="fa-solid fa-user me-1"></i><span th:text="${review.userId}"></span></span>
                    <span><i class="fa-regular fa-clock me-1"></i><span th:text="${review.createdAt}"></span></span>
                </div>
                <p th:text="${review.comment}"></p>

                <div class="d-flex gap-2 flex-wrap">
                    <a th:if="${allowEdit}" th:href="@{/reviews/{id}/edit(id=${review.id})}" class="btn btn-premium-outline btn-sm">Edit</a>
                    <form th:if="${allowEdit}" th:action="@{/reviews/{id}/delete(id=${review.id})}" method="post"
                                                    onsubmit="return confirm('Delete this review permanently? This action cannot be undone.');">
                        <input type="hidden" name="agentId" th:value="${review.agentId}" />
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </article>
        </section>

        <section class="management-panel surface-card management-empty" th:if="${#lists.isEmpty(reviews)}">
            <div class="icon"><i class="fa-regular fa-message"></i></div>
            <h4>No reviews found</h4>
            <p>No review records match the current filter. Adjust your search or add a new review.</p>
        </section>
    </main>

    <div th:replace="~{fragments/site-layout :: siteFooter}"></div>
    <div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
