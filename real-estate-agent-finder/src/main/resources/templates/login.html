<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login - Real Estate Agent Finder</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		  integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
	<link rel="stylesheet" th:href="@{/css/style.css}" />
	<link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
	<link rel="stylesheet" th:href="@{/css/auth-premium.css}" />
</head>

<body>
	<div th:replace="~{fragments/site-layout :: skipLink}"></div>
	<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

	<main class="auth-page auth-login-page py-5 content-shell">
		<div class="container">
			<div th:if="${toastSuccess}" class="d-none" data-toast-message="" data-toast-type="success" th:attr="data-toast-message=${toastSuccess}"></div>
			<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

			<div class="row g-0 auth-shell overflow-hidden">
				<div class="col-lg-6 d-none d-lg-block auth-visual login-visual">
					<div class="auth-overlay-content">
						<h1 style="color: white;">Welcome Back</h1>
					</div>
				</div>

				<div class="col-lg-6 bg-white">
					<div class="auth-card p-4 p-md-5">
						<div class="mb-4">
							<h2 class="auth-title mb-2">Account Login</h2>
						</div>

						<form id="userLoginForm" th:action="@{/login}" method="post" class="row g-3" novalidate data-manual-submit-ux="true">
							<input type="hidden" name="next" th:if="${next != null}" th:value="${next}" />

							<div class="col-12">
								<label class="form-label" for="identifier">Username or Email</label>
								<div class="input-group auth-input-group">
									<span class="input-group-text"><i class="fa-regular fa-id-badge"></i></span>
									<input id="identifier" class="form-control" type="text" name="identifier" placeholder="username or email" required data-trim="true" th:value="${param.identifier}" aria-describedby="identifierHelp identifierError" autocomplete="username" />
								</div>
								<div id="identifierError" class="field-error" data-error-for="identifier">Username or email is required.</div>
							</div>

							<div class="col-12">
								<label class="form-label" for="password">Password</label>
								<div class="input-group auth-input-group">
									<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
									<input id="password" class="form-control" type="password" name="password" placeholder="Enter password" required minlength="8" aria-describedby="passwordHelp passwordError" autocomplete="current-password" />
									<button class="btn password-toggle" type="button" data-password-toggle="password" aria-label="Show password">
										<i class="fa-regular fa-eye"></i>
									</button>
								</div>
								<div id="passwordError" class="field-error" data-error-for="password">Password must be at least 8 characters.</div><br>
							</div>

							<div class="col-12 d-grid mt-2">
								<button type="submit" class="btn btn-site-gold btn-lg">
									<i class="fa-solid fa-right-to-bracket me-1"></i>Login
								</button>
							</div>

							<div id="loginErrorSummary" class="field-error" role="alert" aria-live="assertive"></div>
						</form>

						<p class="mt-4 mb-0 text-center text-muted">
							New here?
							<a th:href="@{/register}" class="auth-link fw-semibold">Create account</a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</main>

	<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
	<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"></script>
	<script th:src="@{/js/validation.js}"></script>
	<script th:src="@{/js/main.js}"></script>
	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const form = document.getElementById('userLoginForm');
			if (!form) {
				return;
			}

			const identifier = form.querySelector('#identifier');
			const password = form.querySelector('#password');
			const summary = form.querySelector('#loginErrorSummary');
			const submitButton = form.querySelector('button[type="submit"]');

			const showFieldError = (input, message) => {
				const errorEl = form.querySelector(`[data-error-for="${input.id}"]`);
				input.classList.add('is-invalid');
				input.setAttribute('aria-invalid', 'true');
				if (errorEl) {
					errorEl.textContent = message;
					errorEl.classList.add('active');
				}
			};

			const clearFieldError = input => {
				const errorEl = form.querySelector(`[data-error-for="${input.id}"]`);
				input.classList.remove('is-invalid');
				input.removeAttribute('aria-invalid');
				if (errorEl) {
					errorEl.classList.remove('active');
				}
			};

			const setSubmittingState = submitting => {
				if (!submitButton) {
					return;
				}
				if (submitting) {
					submitButton.disabled = true;
					if (!submitButton.dataset.originalText) {
						submitButton.dataset.originalText = submitButton.innerHTML;
					}
					submitButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin me-1"></i>Signing in...';
					return;
				}
				submitButton.disabled = false;
				submitButton.innerHTML = submitButton.dataset.originalText || submitButton.innerHTML;
			};

			const validateForm = () => {
				const errors = [];
				summary.textContent = '';

				[identifier, password].forEach(field => {
					if (field) {
						clearFieldError(field);
					}
				});

				if (identifier) {
					identifier.value = identifier.value.trim();
					if (!identifier.value) {
						errors.push({ field: identifier, message: 'Username or email is required.' });
					}
				}

				if (password) {
					if (!password.value) {
						errors.push({ field: password, message: 'Password is required.' });
					} else if (password.value.length < 8) {
						errors.push({ field: password, message: 'Password must be at least 8 characters.' });
					}
				}

				errors.forEach(error => showFieldError(error.field, error.message));
				if (errors.length > 0) {
					summary.textContent = 'Please check your login details and try again.';
					errors[0].field.focus();
					window.SiteUx?.toast('Login details are incomplete.', 'warning', 3200);
					return false;
				}

				return true;
			};

			[identifier, password].forEach(field => {
				field?.addEventListener('input', () => clearFieldError(field));
			});

			form.addEventListener('submit', event => {
				if (form.dataset.submitting === 'true') {
					event.preventDefault();
					return;
				}

				if (!validateForm()) {
					event.preventDefault();
					form.dataset.submitting = 'false';
					setSubmittingState(false);
					window.SiteUx?.hideBusy();
					return;
				}

				form.dataset.submitting = 'true';
				setSubmittingState(true);
				window.SiteUx?.showBusy('Verifying your account...');
			}, true);

			window.addEventListener('pageshow', () => {
				form.dataset.submitting = 'false';
				setSubmittingState(false);
				window.SiteUx?.hideBusy();
			});
		});
	</script>
</body>

</html>
