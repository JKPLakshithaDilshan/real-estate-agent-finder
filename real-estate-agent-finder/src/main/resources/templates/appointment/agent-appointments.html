<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Agent Appointments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/shared-layout.css}" />
    <link rel="stylesheet" th:href="@{/css/appointment-premium-pages.css}" />
</head>

<body>
<div th:replace="~{fragments/site-layout :: siteNavbar}"></div>

<main class="container appointment-list-main content-shell">
    <div th:if="${toastSuccess}" class="d-none" data-toast-message="" data-toast-type="success" th:attr="data-toast-message=${toastSuccess}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <section class="table-card surface-card d-none d-lg-block surface-card" th:if="${!#lists.isEmpty(appointments)}">
        <div class="table-responsive">
            <table class="table premium-table align-middle mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Client</th>
                    <th>Date/Time</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="appointment : ${appointments}">
                    <td class="fw-semibold" th:text="${appointment.id}"></td>
                    <td th:text="${appointment.userId}"></td>
                    <td th:text="${appointment.appointmentDateTime}"></td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${#strings.equalsIgnoreCase(appointment.status, 'CONFIRMED')} ? ' confirmed' : (${#strings.equalsIgnoreCase(appointment.status, 'CANCELLED')} ? ' cancelled' : (${#strings.equalsIgnoreCase(appointment.status, 'COMPLETED')} ? ' completed' : ' pending'))"
                              th:text="${appointment.status}"></span>
                    </td>
                    <td>
                        <div class="d-flex gap-2 flex-wrap">
                            <form th:if="${appointment.status == 'PENDING'}" th:action="@{/appointments/{id}/status(id=${appointment.id})}" method="post">
                                <input type="hidden" name="status" value="CONFIRMED" />
                                <button type="submit" class="btn btn-site-gold btn-sm">
                                    <i class="fa-solid fa-check me-1"></i>Approve
                                </button>
                            </form>
                            <form th:action="@{/appointments/{id}/status(id=${appointment.id})}" method="post" class="d-flex gap-2">
                                <select name="status" class="form-select form-select-sm status-select">
                                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == appointment.status}"></option>
                                </select>
                                <button type="submit" class="btn btn-premium-outline btn-sm">Update</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="d-lg-none" th:if="${!#lists.isEmpty(appointments)}">
        <div class="row g-3">
            <div class="col-12" th:each="appointment : ${appointments}">
                <article class="appointment-mobile-card surface-card">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0" th:text="${appointment.id}"></h6>
                        <span class="status-badge"
                              th:classappend="${#strings.equalsIgnoreCase(appointment.status, 'CONFIRMED')} ? ' confirmed' : (${#strings.equalsIgnoreCase(appointment.status, 'CANCELLED')} ? ' cancelled' : (${#strings.equalsIgnoreCase(appointment.status, 'COMPLETED')} ? ' completed' : ' pending'))"
                              th:text="${appointment.status}"></span>
                    </div>
                    <p class="mb-1"><strong>Client:</strong> <span th:text="${appointment.userId}"></span></p>
                    <p class="mb-3"><strong>Date/Time:</strong> <span th:text="${appointment.appointmentDateTime}"></span></p>

                    <div class="d-flex gap-2 flex-wrap">
                        <form th:if="${appointment.status == 'PENDING'}" th:action="@{/appointments/{id}/status(id=${appointment.id})}" method="post">
                            <input type="hidden" name="status" value="CONFIRMED" />
                            <button type="submit" class="btn btn-site-gold btn-sm">
                                <i class="fa-solid fa-check me-1"></i>Approve
                            </button>
                        </form>
                        <form th:action="@{/appointments/{id}/status(id=${appointment.id})}" method="post" class="d-flex gap-2">
                            <select name="status" class="form-select form-select-sm status-select">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == appointment.status}"></option>
                            </select>
                            <button type="submit" class="btn btn-premium-outline btn-sm">Update</button>
                        </form>
                    </div>
                </article>
            </div>
        </div>
    </section>

    <section class="empty-state surface-card" th:if="${#lists.isEmpty(appointments)}">
        <div class="empty-icon"><i class="fa-regular fa-calendar"></i></div>
        <h5 class="mb-1">No appointments assigned yet</h5>
        <p class="mb-0">Client bookings will appear here when they select your profile.</p>
    </section>
</main>

<div th:replace="~{fragments/site-layout :: siteFooter}"></div>
<div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/main.js}"></script>
</body>

</html>
