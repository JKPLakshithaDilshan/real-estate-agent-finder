<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <link rel="stylesheet" th:href="@{/css/management-premium.css}" />
</head>

<body>
    <div class="admin-layout">
        <div th:replace="~{fragments/admin-layout :: adminSidebar('admins')}"></div>

        <main class="admin-content content-shell">
            <div th:replace="~{fragments/admin-layout :: adminTopbar('Admin Management', '')}"></div>

            <div th:if="${toastSuccess}" class="d-none" data-toast-message="" data-toast-type="success" th:attr="data-toast-message=${toastSuccess}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <section class="admin-panel-card surface-card mb-3 management-toolbar">
                <div class="panel-header">
                    <div>
                        <h4 class="mb-1">Administrator Directory</h4>
                    </div>
                    <div class="inline-summary">
                        <span class="summary-chip"><i class="fa-solid fa-users-gear"></i><span th:text="${#lists.size(admins)}"></span> Records</span>
                    </div>
                </div>

                <form th:action="@{/admin/list}" method="get" class="toolbar-grid">
                    <div class="toolbar-col-6">
                        <label class="form-label" for="q">Search by ID, name, or email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input id="q" class="form-control" type="search" name="q" th:value="${query}" placeholder="AD001 or admin@realestate.com" />
                        </div>
                    </div>
                    <div class="toolbar-col-6">
                        <div class="toolbar-actions">
                            <button type="submit" class="btn btn-site-gold"><i class="fa-solid fa-magnifying-glass me-1"></i>Search</button>
                            <a th:href="@{/admin/list}" class="btn btn-premium-outline">Reset</a>
                            <a th:href="@{/admin/new}" class="btn btn-soft-neutral"><i class="fa-solid fa-user-plus me-1"></i>Add New Admin</a>
                        </div>
                    </div>
                </form>
            </section>

            <section class="admin-panel-card surface-card premium-table-shell">
                <div class="table-responsive">
                    <table class="table align-middle mb-0" style="min-width: 760px;">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Level</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(admins)}">
                                <td colspan="5" class="text-secondary py-4 text-center">No admin records match the current search.</td>
                            </tr>
                            <tr th:each="admin : ${admins}">
                                <td class="fw-semibold" th:text="${admin.id}"></td>
                                <td th:text="${admin.name}"></td>
                                <td th:text="${admin.email}"></td>
                                <td><span class="site-badge site-badge-info" th:text="${admin.adminLevel}"></span></td>
                                <td>
                                    <div class="d-flex gap-2 flex-wrap dense-actions">
                                        <a th:href="@{/admin/{id}/edit(id=${admin.id})}" class="btn btn-premium-outline btn-sm">Edit</a>
                                        <form th:action="@{/admin/{id}/delete(id=${admin.id})}" method="post"
                                              onsubmit="return confirm('Delete this admin account permanently? This action cannot be undone.');">
                                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div th:replace="~{fragments/site-layout :: globalUxLayer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
